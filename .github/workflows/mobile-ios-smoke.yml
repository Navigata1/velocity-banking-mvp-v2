name: Mobile iOS smoke

on:
  workflow_dispatch:
    inputs:
      simulator:
        description: Optional iPhone Simulator name or UDID
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.simulator }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ios-smoke:
    name: Expo Go iOS simulator smoke
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Select Xcode and warm Simulator tools
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1)"
          test -n "$XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Run mobile type-check
        working-directory: apps/mobile
        run: npm run check

      - name: Smoke iOS simulator
        working-directory: apps/mobile
        env:
          EXPO_NO_TELEMETRY: 1
          IOS_SMOKE_SIMULATOR: ${{ inputs.simulator }}
        run: npm run smoke:ios

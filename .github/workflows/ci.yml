name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-mobile-quality:
    name: Web and mobile quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/mobile/package-lock.json
            apps/media/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run web regression tests
        working-directory: apps/web
        run: npm test

      - name: Run web lint
        working-directory: apps/web
        run: npm run lint

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Verify built Money Loop Three stage
        working-directory: apps/web
        run: npm run test:3d:built

      - name: Upload Money Loop Three stage proof
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: money-loop-three-stage
          path: apps/web/test-results/three-stage
          if-no-files-found: error

      - name: Smoke built web routes
        working-directory: apps/web
        run: npm run smoke:routes

      - name: Smoke rendered web routes
        working-directory: apps/web
        run: npm run smoke:rendered:built

      - name: Install media workspace dependencies
        working-directory: apps/media
        run: npm ci

      - name: Check media identity contracts
        working-directory: apps/media
        run: npm run check

      - name: Install report Worker dependencies
        working-directory: apps/report-worker
        run: npm ci

      - name: Check and test report Worker
        working-directory: apps/report-worker
        run: |
          npm run check
          npm test
          npm audit --omit=dev
          npm run build:dry-run

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Run mobile type-check
        working-directory: apps/mobile
        run: npm run check

      - name: Build Expo web export
        working-directory: apps/mobile
        env:
          EXPO_NO_TELEMETRY: 1
        run: npm run build:web

      - name: Smoke Expo web export
        working-directory: apps/mobile
        run: npm run smoke:web-export

      - name: Run mobile contract tests
        run: node scripts/mobile-port-contract-tests.cjs

      - name: Verify iOS smoke guard on Linux
        working-directory: apps/mobile
        shell: bash
        run: |
          set +e
          output="$(npm run smoke:ios 2>&1)"
          status=$?
          set -e
          echo "$output"
          test "$status" -eq 1
          grep -F "iOS Expo Go smoke requires macOS with Xcode and Simulator." <<< "$output"

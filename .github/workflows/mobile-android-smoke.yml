name: Mobile Android smoke

on:
  workflow_dispatch:
    inputs:
      api_level:
        description: Android API level
        required: true
        default: '36'
      avd_name:
        description: Android virtual device name
        required: true
        default: InterestShield_CI_API_36

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.api_level }}-${{ inputs.avd_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  android-smoke:
    name: Expo Go Android emulator smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Run mobile type-check
        working-directory: apps/mobile
        run: npm run check

      - name: Add Android SDK tools to PATH
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          ANDROID_AVD_HOME="${ANDROID_AVD_HOME:-$HOME/.android/avd}"
          mkdir -p "$ANDROID_AVD_HOME"
          echo "ANDROID_AVD_HOME=$ANDROID_AVD_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/emulator" >> "$GITHUB_PATH"
          test -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          test -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          if [ -e /dev/kvm ]; then
            sudo chown "$USER" /dev/kvm
            ls -l /dev/kvm
          else
            echo "/dev/kvm is not available on this runner"
            exit 1
          fi

      - name: Install Android emulator image
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-${{ inputs.api_level }}" \
            "system-images;android-${{ inputs.api_level }};google_apis;x86_64"

      - name: Create Android virtual device
        run: |
          echo "no" | avdmanager create avd \
            --force \
            --name "${{ inputs.avd_name }}" \
            --package "system-images;android-${{ inputs.api_level }};google_apis;x86_64" \
            --device "pixel_5"
          emulator -list-avds
          test -f "$ANDROID_AVD_HOME/${{ inputs.avd_name }}.ini"

      - name: Smoke Android emulator
        working-directory: apps/mobile
        env:
          ANDROID_SMOKE_AVD: ${{ inputs.avd_name }}
          ANDROID_SMOKE_SCREENSHOT: ${{ runner.temp }}/interestshield-android-smoke.png
          ANDROID_SMOKE_TIMEOUT_MS: 600000
          EXPO_NO_TELEMETRY: 1
        run: npm run smoke:android

      - name: Upload Android smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interestshield-android-smoke
          path: ${{ runner.temp }}/interestshield-android-smoke.png
          if-no-files-found: ignore

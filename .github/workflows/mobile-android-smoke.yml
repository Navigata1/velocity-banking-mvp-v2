name: Mobile Android smoke

on:
  workflow_dispatch:
    inputs:
      api_level:
        description: Android API level
        required: true
        default: '36'
      avd_name:
        description: Android virtual device name
        required: true
        default: InterestShield_CI_API_36

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.api_level }}-${{ inputs.avd_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  android-smoke:
    name: Expo Go Android emulator smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Run mobile type-check
        working-directory: apps/mobile
        run: npm run check

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Android emulator image
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-${{ inputs.api_level }}" \
            "system-images;android-${{ inputs.api_level }};google_apis;x86_64"

      - name: Create Android virtual device
        run: |
          echo "no" | avdmanager create avd \
            --force \
            --name "${{ inputs.avd_name }}" \
            --package "system-images;android-${{ inputs.api_level }};google_apis;x86_64" \
            --device "pixel_5"

      - name: Smoke Android emulator
        working-directory: apps/mobile
        env:
          ANDROID_SMOKE_AVD: ${{ inputs.avd_name }}
          ANDROID_SMOKE_SCREENSHOT: ${{ runner.temp }}/interestshield-android-smoke.png
          ANDROID_SMOKE_TIMEOUT_MS: 240000
          EXPO_NO_TELEMETRY: 1
        run: npm run smoke:android

      - name: Upload Android smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interestshield-android-smoke
          path: ${{ runner.temp }}/interestshield-android-smoke.png
          if-no-files-found: ignore
